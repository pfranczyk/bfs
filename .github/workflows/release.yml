name: Release
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      # Derive the npm dist-tag from the package version. A prerelease such as
      # 0.7.0-beta.0 publishes under its prerelease id ("beta"), so the `latest`
      # tag — what `npm i bfs-vault` and `npm update` resolve to — is never moved
      # to an unfinished release. A stable version (no hyphen) publishes under
      # `latest` as usual. Without this, `npm publish` would set `latest` even
      # for a prerelease, pushing the beta onto every default install.
      - name: Resolve npm dist-tag
        id: disttag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            TAG="${PRERELEASE%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION under npm dist-tag '$TAG'"
      - run: npm publish --access public --tag "${{ steps.disttag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
